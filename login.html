<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — HelpDesk</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'IBM Plex Sans', sans-serif; }
    .mono { font-family: 'IBM Plex Mono', monospace; }
    .grid-bg {
      background-image:
        linear-gradient(rgba(99,102,241,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.06) 1px, transparent 1px);
      background-size: 32px 32px;
    }
    .input-field {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 0.5rem;
      padding: 0.75rem 1rem;
      color: #f1f5f9;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      box-sizing: border-box;
    }
    .input-field::placeholder { color: #64748b; }
    .input-field:focus { border-color: #6366f1; box-shadow: 0 0 0 1px #6366f1; }
    .input-pw { padding-right: 2.75rem; }
  </style>
</head>
<body class="min-h-screen bg-slate-950 grid-bg flex items-center justify-center p-4">

  <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

  <div class="w-full max-w-md">
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-indigo-600 mb-4 shadow-lg shadow-indigo-500/30">
        <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M11.983 4.5c.417 0 .824.033 1.22.097l.36 1.873a6.5 6.5 0 011.68.973l1.78-.72a8.03 8.03 0 011.727 1.727l-.72 1.78c.373.51.695 1.072.973 1.68l1.873.36c.064.396.097.803.097 1.22s-.033.824-.097 1.22l-1.873.36a6.5 6.5 0 01-.973 1.68l.72 1.78a8.03 8.03 0 01-1.727 1.727l-1.78-.72a6.5 6.5 0 01-1.68.973l-.36 1.873a8.03 8.03 0 01-2.44 0l-.36-1.873a6.5 6.5 0 01-1.68-.973l-1.78.72a8.03 8.03 0 01-1.727-1.727l.72-1.78a6.5 6.5 0 01-.973-1.68l-1.873-.36A8.03 8.03 0 014.5 12c0-.417.033-.824.097-1.22l1.873-.36c.278-.608.6-1.17.973-1.68l-.72-1.78A8.03 8.03 0 018.45 5.233l1.78.72c.51-.373 1.072-.695 1.68-.973l.36-1.873c.396-.064.803-.097 1.22-.097z" />
          <circle cx="12" cy="12" r="3" />
        </svg>
      </div>
      <h1 class="text-2xl font-semibold text-slate-100">HelpDesk</h1>
      <p class="text-slate-500 text-sm mt-1 mono">Sistema de Gestão de Chamados</p>
    </div>

    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-8 shadow-2xl">
      <h2 class="text-lg font-semibold text-slate-100 mb-6">Entrar no sistema</h2>

      <form id="login-form" class="space-y-4" novalidate>
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1.5 mono uppercase tracking-wider">Usuário</label>
          <input id="username" type="text" class="input-field" placeholder="seu.usuario" autocomplete="username" />
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1.5 mono uppercase tracking-wider">Senha</label>
          <div class="relative">
            <input id="password" type="password" class="input-field input-pw" placeholder="••••••••" autocomplete="current-password" />
            <button type="button" id="toggle-pw"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 transition-colors">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>
        <button id="btn-login" type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 px-4 rounded-lg transition-colors text-sm shadow-lg shadow-indigo-500/20">
          Login
        </button>
      </form>
    </div>

    <p class="text-center text-slate-600 text-xs mt-6 mono">v1.0.0 © 2025 HelpDesk</p>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script>
    // Se já está logado, vai direto pro dashboard
    if (isLoggedIn()) window.location.replace(getBasePath() + 'index.html');

    document.getElementById('toggle-pw').addEventListener('click', () => {
      const pw = document.getElementById('password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('btn-login');

      if (!username || !password) {
        toast('Preencha usuário e senha', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Aguarde...';
      try {
        const res = await api.login(username, password);
        localStorage.setItem('hd_token', res.token);
        localStorage.setItem('hd_user', JSON.stringify(res.user));
        window.location.replace(getBasePath() + 'index.html');
      } catch (err) {
        toast(err.message || 'Credenciais inválidas', 'error');
        btn.disabled = false;
        btn.textContent = 'Login';
      }
    });
  </script>
</body>
</html>
