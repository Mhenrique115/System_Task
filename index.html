<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — HelpDesk</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <style>
    body { font-family: 'IBM Plex Sans', sans-serif; background: #0f172a; }
    .mono { font-family: 'IBM Plex Mono', monospace; }
  </style>
</head>
<body class="text-slate-100 min-h-screen">
  <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>
  <div id="app-layout" class="flex"></div>

  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/layout.js"></script>
  <script>
    requireAuth();
    renderLayout('index.html');
    document.getElementById('page-title').textContent = 'Dashboard';

    async function loadDashboard() {
      const content = document.getElementById('page-content');
      content.innerHTML = `<div class="flex items-center justify-center h-64 text-slate-500">Carregando...</div>`;

      try {
        const data = await api.getDashboard();
        const { resumo, topUsuarios, topPorTempo, topPorValor } = data;

        const total = resumo.length;
        const abertos = resumo.filter(c => c.status === 'aberto').length;
        const finalizados = resumo.filter(c => c.status === 'finalizado').length;
        const valorTotal = resumo.reduce((acc, c) => acc + c.valorTotal, 0);

        content.innerHTML = `
          <!-- KPI Cards -->
          <div class="grid grid-cols-2 xl:grid-cols-4 gap-4 mb-8">
            ${kpiCard('Total de Chamados', total, '⊞', 'indigo')}
            ${kpiCard('Em Aberto', abertos, '◐', 'amber')}
            ${kpiCard('Finalizados', finalizados, '✓', 'emerald')}
            ${kpiCard('Valor Total', formatCurrency(valorTotal), '◈', 'purple')}
          </div>

          <!-- Summary Table -->
          <div class="bg-slate-900 border border-slate-800 rounded-xl mb-8 overflow-hidden">
            <div class="px-5 py-4 border-b border-slate-800 flex items-center justify-between">
              <h2 class="font-semibold text-slate-200">Resumo de Chamados</h2>
              <span class="text-xs text-slate-500 mono">${total} registros</span>
            </div>
            <div class="overflow-x-auto">
              <table class="w-full text-sm">
                <thead>
                  <tr class="text-xs text-slate-500 mono uppercase tracking-wider border-b border-slate-800">
                    <th class="text-left px-5 py-3">ID</th>
                    <th class="text-left px-5 py-3">Chamado</th>
                    <th class="text-left px-5 py-3">Status</th>
                    <th class="text-right px-5 py-3">Tempo Total</th>
                    <th class="text-right px-5 py-3">Valor Total</th>
                  </tr>
                </thead>
                <tbody>
                  ${resumo.slice(0, 10).map(c => `
                    <tr class="border-b border-slate-800/50 hover:bg-slate-800/30 transition-colors">
                      <td class="px-5 py-3">
                        <a href="chamado-detalhe.html?id=${c.id}" class="text-indigo-400 hover:text-indigo-300 mono text-xs">
                          ${c.id.slice(0, 8)}…
                        </a>
                      </td>
                      <td class="px-5 py-3 text-slate-300 max-w-xs truncate">${c.nome}</td>
                      <td class="px-5 py-3">${statusBadge(c.status)}</td>
                      <td class="px-5 py-3 text-right mono text-slate-400 text-xs">${formatDuration(c.tempoTotalMinutos)}</td>
                      <td class="px-5 py-3 text-right text-slate-300 font-medium">${formatCurrency(c.valorTotal)}</td>
                    </tr>
                  `).join('')}
                  ${resumo.length === 0 ? `<tr><td colspan="5" class="px-5 py-10 text-center text-slate-500">Nenhum chamado encontrado</td></tr>` : ''}
                </tbody>
              </table>
            </div>
          </div>

          <!-- Rankings -->
          <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            ${rankCard('🏆 Top Usuários', topUsuarios, u => ({
              label: u.username,
              value: `${u.count} chamado${u.count !== 1 ? 's' : ''}`,
              valueClass: 'text-indigo-400'
            }))}
            ${rankCard('⏱ Maior Duração', topPorTempo, c => ({
              label: c.nome,
              value: c.tempoFormatado,
              valueClass: 'text-amber-400'
            }))}
            ${rankCard('💰 Maior Valor', topPorValor, c => ({
              label: c.nome,
              value: formatCurrency(c.valorTotal),
              valueClass: 'text-emerald-400'
            }))}
          </div>
        `;
      } catch (err) {
        content.innerHTML = `<div class="text-red-400 text-center py-20">${err.message}</div>`;
      }
    }

    function kpiCard(label, value, icon, color) {
      const colors = {
        indigo: 'bg-indigo-500/10 text-indigo-400 border-indigo-500/20',
        amber:  'bg-amber-500/10  text-amber-400  border-amber-500/20',
        emerald:'bg-emerald-500/10 text-emerald-400 border-emerald-500/20',
        purple: 'bg-purple-500/10 text-purple-400 border-purple-500/20',
      };
      return `
        <div class="bg-slate-900 border border-slate-800 rounded-xl p-5">
          <div class="flex items-center justify-between mb-4">
            <span class="text-slate-400 text-sm">${label}</span>
            <div class="w-8 h-8 rounded-lg border ${colors[color]} flex items-center justify-center mono text-base">
              ${icon}
            </div>
          </div>
          <div class="text-2xl font-bold text-slate-100">${value}</div>
        </div>`;
    }

    function rankCard(title, items, mapFn) {
      const rows = items.length
        ? items.map((item, i) => {
            const { label, value, valueClass } = mapFn(item);
            return `
              <div class="flex items-center gap-3 py-2.5 border-b border-slate-800/50 last:border-0">
                <span class="mono text-xs text-slate-600 w-5 text-right">${i + 1}</span>
                <span class="flex-1 text-slate-300 text-sm truncate">${label}</span>
                <span class="mono text-xs font-semibold ${valueClass}">${value}</span>
              </div>`;
          }).join('')
        : `<p class="text-slate-500 text-sm py-4 text-center">Sem dados</p>`;

      return `
        <div class="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden">
          <div class="px-5 py-4 border-b border-slate-800">
            <h3 class="font-semibold text-slate-200 text-sm">${title}</h3>
          </div>
          <div class="px-5 py-2">${rows}</div>
        </div>`;
    }

    loadDashboard();
  </script>
</body>
</html>
