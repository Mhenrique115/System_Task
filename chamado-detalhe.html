<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detalhe do Chamado — HelpDesk</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'IBM Plex Sans', sans-serif; background: #0f172a; }
    .mono { font-family: 'IBM Plex Mono', monospace; }
    #task-list { scroll-behavior: smooth; }
    .task-bubble {
      animation: slideIn 0.2s ease-out;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="text-slate-100 min-h-screen">
  <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>
  <div id="app-layout" class="flex"></div>

  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/layout.js"></script>
  <script>
    requireAuth();
    renderLayout('chamados.html');

    const params = new URLSearchParams(window.location.search);
    const chamadoId = params.get('id');
    if (!chamadoId) window.location.href = 'chamados.html';

    let chamado = null;
    let showingNewTask = false;

    async function loadChamado() {
      try {
        chamado = await api.getChamado(chamadoId);
        renderDetalhe();
      } catch (err) {
        document.getElementById('page-content').innerHTML =
          `<div class="text-red-400 text-center py-20">${err.message}</div>`;
      }
    }

    function renderDetalhe() {
      document.getElementById('page-title').textContent = `Chamado — ${chamado.nome}`;

      const content = document.getElementById('page-content');
      content.innerHTML = `
        <div class="max-w-4xl mx-auto">
          <!-- Back + Header -->
          <div class="flex items-start gap-4 mb-6">
            <a href="chamados.html"
               class="flex items-center gap-1.5 text-slate-500 hover:text-slate-300 text-sm transition-colors mt-0.5">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
              </svg>
              Voltar
            </a>
            <div class="flex-1">
              <div class="flex items-center gap-3 flex-wrap">
                <h1 class="text-xl font-semibold text-slate-100">${chamado.nome}</h1>
                ${statusBadge(chamado.status)}
              </div>
              <div class="flex items-center gap-4 mt-1.5 flex-wrap">
                <span class="text-slate-500 text-xs mono">ID: ${chamado.id.slice(0, 8)}…</span>
                <span class="text-slate-500 text-xs">Cliente: <span class="text-slate-300">${chamado.cliente}</span></span>
                <span class="text-slate-500 text-xs">Responsável: <span class="text-slate-300">${chamado.usuario.username}</span></span>
                <span class="text-slate-500 text-xs">Valor: <span class="text-emerald-400 font-semibold">${formatCurrency(chamado.valor)}</span></span>
                <span class="text-slate-500 text-xs">Valor Total: <span class="text-emerald-400 font-semibold">${formatCurrency(chamado.valorTotal)}</span></span>
              </div>
            </div>
            ${chamado.status === 'aberto' ? `
              <button onclick="finalizarChamado()"
                class="flex items-center gap-2 bg-emerald-500/10 hover:bg-emerald-500/20 border border-emerald-500/20 text-emerald-400 px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                </svg>
                Finalizar Chamado
              </button>` : ''}
          </div>

          <!-- Stats bar -->
          <div class="grid grid-cols-3 gap-4 mb-6">
            <div class="bg-slate-900 border border-slate-800 rounded-xl p-4">
              <div class="text-xs text-slate-500 mono mb-1">INÍCIO</div>
              <div class="text-slate-200 text-sm">${formatDate(chamado.dtInicio)}</div>
            </div>
            <div class="bg-slate-900 border border-slate-800 rounded-xl p-4">
              <div class="text-xs text-slate-500 mono mb-1">FIM</div>
              <div class="text-slate-200 text-sm">${chamado.dtFim ? formatDate(chamado.dtFim) : '—'}</div>
            </div>
            <div class="bg-slate-900 border border-slate-800 rounded-xl p-4">
              <div class="text-xs text-slate-500 mono mb-1">TEMPO TOTAL</div>
              <div class="text-indigo-400 text-sm font-semibold mono">${chamado.tempoTotalFormatado || '0h 0m'}</div>
            </div>
          </div>

          <!-- Chat timeline -->
          <div class="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden">
            <div class="px-5 py-4 border-b border-slate-800 flex items-center justify-between">
              <h2 class="font-semibold text-slate-200 flex items-center gap-2">
                <span>Tarefas</span>
                <span class="bg-slate-800 text-slate-400 text-xs mono px-2 py-0.5 rounded-full">${chamado.tarefas.length}</span>
              </h2>
              ${chamado.status === 'aberto' ? `
                <button id="btn-nova-tarefa" onclick="toggleNewTask()"
                  class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white px-3 py-1.5 rounded-lg text-xs font-semibold transition-colors shadow shadow-indigo-500/20">
                  <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
                  </svg>
                  Nova Tarefa
                </button>` : ''}
            </div>

            <!-- Task list -->
            <div id="task-list" class="p-5 space-y-3 max-h-[60vh] overflow-y-auto">
              ${chamado.tarefas.length === 0
                ? `<p class="text-center text-slate-500 py-10">Nenhuma tarefa ainda. Adicione a primeira tarefa abaixo.</p>`
                : chamado.tarefas.map(t => taskBubble(t)).join('')}
            </div>

            <!-- New task form -->
            <div id="new-task-form" class="hidden border-t border-slate-800 p-5">
              <div class="flex flex-col gap-3">
                <textarea id="new-task-desc" rows="3" placeholder="Descreva a tarefa..."
                  class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 resize-none"></textarea>
                <div class="flex gap-2 justify-end">
                  <button onclick="cancelNewTask()"
                    class="px-4 py-2 rounded-lg border border-slate-700 text-slate-400 hover:text-slate-200 text-sm transition-colors">
                    Cancelar
                  </button>
                  <button id="btn-enviar-tarefa" onclick="submitTarefa()"
                    class="px-4 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white font-semibold text-sm transition-colors shadow shadow-indigo-500/20">
                    Enviar
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function taskBubble(t) {
      const duracao = t.dtFim
        ? `<span class="mono text-xs text-slate-500">⏱ ${formatDuration(t.duracaoMinutos)}</span>`
        : '';

      const closeBtn = t.status === 'aberto'
        ? `<button onclick="fecharTarefa('${t.id}')"
             class="flex items-center gap-1.5 text-xs px-3 py-1.5 rounded-lg bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 hover:bg-emerald-500/20 transition-colors">
             <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
               <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
             </svg>
             Fechar tarefa
           </button>`
        : '';

      const borderColor = t.status === 'fechado' ? 'border-slate-700' : 'border-indigo-500/30';
      const dotColor = t.status === 'fechado' ? 'bg-slate-500' : 'bg-indigo-500 animate-pulse';

      return `
        <div class="task-bubble bg-slate-800/50 border ${borderColor} rounded-xl p-4 flex gap-4">
          <!-- Status dot -->
          <div class="mt-1.5 flex-shrink-0">
            <div class="w-2.5 h-2.5 rounded-full ${dotColor}"></div>
          </div>

          <div class="flex-1 min-w-0">
            <p class="text-slate-200 text-sm leading-relaxed">${t.descricao}</p>

            <div class="flex items-center flex-wrap gap-3 mt-2.5">
              <span class="mono text-xs text-slate-500">📅 ${formatDate(t.dtInicio)}</span>
              ${t.dtFim ? `<span class="mono text-xs text-slate-500">→ ${formatDate(t.dtFim)}</span>` : ''}
              ${duracao}
              ${t.status === 'fechado'
                ? `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs bg-slate-700 text-slate-400 border border-slate-600">✓ Fechado</span>`
                : `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs bg-indigo-500/10 text-indigo-400 border border-indigo-500/20">● Aberto</span>`}
            </div>

            ${closeBtn ? `<div class="mt-3">${closeBtn}</div>` : ''}
          </div>
        </div>`;
    }

    function toggleNewTask() {
      const form = document.getElementById('new-task-form');
      showingNewTask = !showingNewTask;
      if (showingNewTask) {
        form.classList.remove('hidden');
        document.getElementById('new-task-desc')?.focus();
      } else {
        form.classList.add('hidden');
      }
    }

    function cancelNewTask() {
      showingNewTask = false;
      document.getElementById('new-task-form').classList.add('hidden');
      document.getElementById('new-task-desc').value = '';
    }

    async function submitTarefa() {
      const desc = document.getElementById('new-task-desc').value.trim();
      if (!desc) { toast('Informe a descrição da tarefa', 'error'); return; }

      const btn = document.getElementById('btn-enviar-tarefa');
      setLoading(btn, true);
      try {
        await api.createTarefa(chamadoId, { descricao: desc });
        toast('Tarefa criada!', 'success');
        cancelNewTask();
        await loadChamado();
        // Scroll to bottom of task list
        const list = document.getElementById('task-list');
        if (list) list.scrollTop = list.scrollHeight;
      } catch (err) {
        toast(err.message, 'error');
      } finally {
        setLoading(btn, false);
      }
    }

    async function fecharTarefa(id) {
      try {
        await api.fecharTarefa(id);
        toast('Tarefa fechada!', 'success');
        await loadChamado();
      } catch (err) {
        toast(err.message, 'error');
      }
    }

    async function finalizarChamado() {
      if (!confirm('Finalizar este chamado?')) return;
      try {
        await api.finalizarChamado(chamadoId);
        toast('Chamado finalizado!', 'success');
        await loadChamado();
      } catch (err) {
        toast(err.message, 'error');
      }
    }

    loadChamado();
  </script>
</body>
</html>
